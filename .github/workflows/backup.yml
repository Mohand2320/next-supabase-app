name: Supabase Backup to Google Drive

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Installer les dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils
          echo "✅ pg_dump : $(pg_dump --version)"

      - name: Vérifier les secrets
        env:
          CHECK_DB: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CHECK_GD: ${{ secrets.GDRIVE_CREDENTIALS }}
          CHECK_FO: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          MISSING=""
          [ -z "$CHECK_DB" ] && MISSING="$MISSING SUPABASE_DB_PASSWORD"
          [ -z "$CHECK_GD" ] && MISSING="$MISSING GDRIVE_CREDENTIALS"
          [ -z "$CHECK_FO" ] && MISSING="$MISSING GDRIVE_FOLDER_ID"
          if [ -n "$MISSING" ]; then
            echo "Secrets manquants :$MISSING"
            exit 1
          fi
          echo "Tous les secrets sont présents"

      - name: Tester la connexion Supabase
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGCLIENT_TIMEOUT: 10
        run: |
          psql \
            -h "db.rrfbxvlzefyrlkeksmlb.supabase.co" \
            -p 5432 \
            -U postgres \
            -d postgres \
            -c "SELECT 1 AS connection_ok"
          if [ $? -ne 0 ]; then
            echo "Échec de la connexion à Supabase"
            exit 1
          fi
          echo "Connexion à Supabase réussie"

      - name: Créer le backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGCLIENT_TIMEOUT: 10
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
          pg_dump \
            -h "db.rrfbxvlzefyrlkeksmlb.supabase.co" \
            -p 5432 \
            -U postgres \
            -d postgres \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            | gzip > "$FILENAME"
          SIZE=$(stat -c%s "$FILENAME")
          if [ "$SIZE" -lt 1024 ]; then
            echo "Fichier backup suspect : ${SIZE} octets seulement"
            exit 1
          fi
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "Backup créé : $FILENAME"

      - name: Installer rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "rclone : $(rclone version | head -1)"

      - name: Configurer rclone (Google Drive)
        env:
          GDRIVE_CRED: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$GDRIVE_CRED" > ~/.config/rclone/gdrive.json
          python3 -c "import json,sys; json.load(open('/home/runner/.config/rclone/gdrive.json')) and print('JSON valide')" || { echo "JSON credentials invalide"; exit 1; }
          printf '[gdrive]\ntype = drive\nscope = drive\nservice_account_file = /home/runner/.config/rclone/gdrive.json\nroot_folder_id = %s\n' "$GDRIVE_FOLDER_ID" > ~/.config/rclone/rclone.conf
          rclone lsd gdrive:/ --max-depth 1 && echo "Connexion Google Drive OK" || { echo "Erreur connexion Google Drive"; exit 1; }

      - name: Uploader vers Google Drive
        run: |
          rclone copy "${{ env.FILENAME }}" gdrive:/ --progress
          echo "Upload terminé"

      - name: Supprimer les backups anciens
        run: |
          rclone delete gdrive:/ --min-age 30d --include "backup_*.sql.gz"
          echo "Nettoyage terminé"

      - name: Notification en cas d'échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Backup Supabase échoué"
          body: "Le backup automatique a échoué. Vérifiez les logs GitHub Actions."
          to: ${{ secrets.MAIL_USER }}
          from: "Supabase Backup <${{ secrets.MAIL_USER }}>"