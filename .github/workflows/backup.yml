name: Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Installer les dépendances (PostgreSQL 17)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 dnsutils
          echo "✅ pg_dump : $(/usr/lib/postgresql/17/bin/pg_dump --version)"

      - name: Vérifier le secret de Base de Données
        env:
          CHECK_DB: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$CHECK_DB" ]; then
            echo "Secret manquant : SUPABASE_DB_URL"
            exit 1
          fi
          echo "Le secret est présent."

      - name: Tester la connexion Supabase
        env:
          PGCLIENT_TIMEOUT: 10
        run: |
          psql "${{ secrets.SUPABASE_DB_URL }}" -c "SELECT 1 AS connection_ok"
          if [ $? -ne 0 ]; then
            echo "Échec de la connexion à Supabase"
            exit 1
          fi
          echo "Connexion à Supabase réussie"

      - name: Créer le backup
        env:
          PGCLIENT_TIMEOUT: 10
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            | gzip > "$FILENAME"
          SIZE=$(stat -c%s "$FILENAME")
          if [ "$SIZE" -lt 1024 ]; then
            echo "Fichier backup suspect : ${SIZE} octets seulement"
            exit 1
          fi
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "Backup créé : $FILENAME"

      - name: Stocker dans GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 30

      - name: Notification en cas d'échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Backup Supabase échoué"
          body: "Le backup automatique a échoué. Vérifiez les logs GitHub Actions."
          to: ${{ secrets.MAIL_USER }}
          from: "Supabase Backup <${{ secrets.MAIL_USER }}>"