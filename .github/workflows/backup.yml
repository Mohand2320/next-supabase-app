# ============================================================
# WORKFLOW : Backup automatique Supabase → Google Drive
# Fréquence : Tous les jours à 2h du matin (UTC)
# ============================================================

name: Supabase Backup to Google Drive

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------------
      # ÉTAPE 1 — Installer les outils nécessaires
      # postgresql-client : fournit pg_dump et psql
      # dnsutils          : fournit dig pour récupérer l'IPv4
      # -------------------------------------------------------
      - name: Installer les dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils
          echo "✅ pg_dump installé : $(pg_dump --version)"

      # -------------------------------------------------------
      # ÉTAPE 2 — Vérifier la présence du mot de passe Supabase
      # -------------------------------------------------------
      - name: Vérifier le secret PGPASSWORD
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "❌ Secret SUPABASE_DB_PASSWORD non défini"
            exit 1
          fi
          echo "✅ Secret SUPABASE_DB_PASSWORD présent"

      # -------------------------------------------------------
      # ÉTAPE 3 — Récupérer l'adresse IPv4 du serveur Supabase
      #            (pour éviter l'erreur "Network is unreachable")
      # -------------------------------------------------------
      - name: Récupérer l'IPv4 du serveur
        id: get_ip
        run: |
          # Remplacer par le vrai nom d'hôte de votre projet Supabase
          HOST="db.rrfbxvlzefyrlkeksmlb.supabase.co"
          IPV4=$(dig +short "$HOST" A | head -1)
          if [ -z "$IPV4" ]; then
            echo "❌ Impossible de résoudre l'IPv4 de $HOST"
            exit 1
          fi
          echo "IPV4=$IPV4" >> $GITHUB_OUTPUT
          echo "✅ Adresse IPv4 trouvée : $IPV4"

      # -------------------------------------------------------
      # ÉTAPE 4 — Tester la connexion à la base avec psql
      # -------------------------------------------------------
      - name: Tester la connexion Supabase
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql -h ${{ steps.get_ip.outputs.IPV4 }} -p 5432 -U postgres -d postgres -c "SELECT 1"

      # -------------------------------------------------------
      # ÉTAPE 5 — Créer le backup compressé
      # -------------------------------------------------------
      - name: Créer le backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"

          pg_dump -h ${{ steps.get_ip.outputs.IPV4 }} \
                  -p 5432 \
                  -U postgres \
                  -d postgres \
                  --clean \
                  --if-exists \
                  --no-owner \
                  --no-privileges \
            | gzip > "$FILENAME"

          # Vérifier que le fichier n'est pas vide (> 1 Ko)
          SIZE=$(stat -c%s "$FILENAME")
          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ Fichier backup suspect : seulement ${SIZE} octets"
            exit 1
          fi

          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "✅ Backup créé : $FILENAME ($(du -sh $FILENAME | cut -f1))"

      # -------------------------------------------------------
      # ÉTAPE 6 — Installer rclone
      # -------------------------------------------------------
      - name: Installer rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          echo "✅ rclone installé : $(rclone version | head -1)"

      # -------------------------------------------------------
      # ÉTAPE 7 — Configurer rclone avec Google Drive
      # -------------------------------------------------------
      - name: Configurer rclone (Google Drive)
        env:
          GDRIVE_CRED: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          mkdir -p ~/.config/rclone

          python3 -c "
          import json, os
          raw = os.environ['GDRIVE_CRED']
          data = json.loads(raw)
          with open('/home/runner/.config/rclone/gdrive.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('✅ JSON credentials valide')
          "

          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /home/runner/.config/rclone/gdrive.json
          root_folder_id = GDRIVE_FOLDER_ID_PLACEHOLDER
          EOF

          sed -i "s|GDRIVE_FOLDER_ID_PLACEHOLDER|${{ secrets.GDRIVE_FOLDER_ID }}|g" \
            ~/.config/rclone/rclone.conf

          echo "✅ rclone configuré avec succès"

      # -------------------------------------------------------
      # ÉTAPE 8 — Uploader le backup vers Google Drive
      # -------------------------------------------------------
      - name: Uploader vers Google Drive
        run: |
          echo "📤 Upload de ${{ env.FILENAME }}..."
          rclone copy "${{ env.FILENAME }}" gdrive:/
          echo "✅ Upload terminé"

      # -------------------------------------------------------
      # ÉTAPE 9 — Supprimer les backups de plus de 30 jours
      # -------------------------------------------------------
      - name: Supprimer les backups anciens
        run: |
          echo "🧹 Nettoyage des backups de plus de 30 jours..."
          rclone delete gdrive:/ --min-age 30d
          echo "✅ Nettoyage terminé"

      # -------------------------------------------------------
      # ÉTAPE 10 — Notification en cas d'échec uniquement
      # -------------------------------------------------------
      - name: Notification en cas d'échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Backup DentiPro échoué"
          body: "Le backup automatique de la base de données DentiPro a échoué. Vérifier les logs GitHub Actions."
          to: ${{ secrets.MAIL_USER }}
          from: "DentiPro Backup <${{ secrets.MAIL_USER }}>"