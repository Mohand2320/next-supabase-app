# ============================================================
# WORKFLOW : Backup automatique Supabase → Google Drive
# Fréquence : Tous les jours à 2h du matin (UTC)
# ============================================================

name: Supabase Backup to Google Drive

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------------
      # ÉTAPE 1 — Installer les outils nécessaires
      # postgresql-client : fournit pg_dump
      # -------------------------------------------------------
      - name: Installer les dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          echo "✅ pg_dump installé : $(pg_dump --version)"

      # -------------------------------------------------------
      # ÉTAPE 2 — Créer le backup compressé
      # Le fichier est nommé avec la date/heure exacte
      # -------------------------------------------------------
      - name: Créer le backup
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"

          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            | gzip > "$FILENAME"

          # Vérifier que le fichier n'est pas vide (> 1Ko)
          SIZE=$(stat -c%s "$FILENAME")
          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ Fichier backup suspect : seulement ${SIZE} octets"
            echo "   Vérifier la connexion Supabase (SUPABASE_DB_URL)"
            exit 1
          fi

          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "✅ Backup créé : $FILENAME ($(du -sh $FILENAME | cut -f1))"

      # -------------------------------------------------------
      # ÉTAPE 3 — Installer rclone
      # -------------------------------------------------------
      - name: Installer rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          echo "✅ rclone installé : $(rclone version | head -1)"

      # -------------------------------------------------------
      # ÉTAPE 4 — Configurer rclone avec Google Drive
      #
      # PRÉREQUIS (une seule fois) :
      # 1. console.cloud.google.com → activer "Google Drive API"
      # 2. IAM → Service Accounts → Créer → Générer clé JSON
      # 3. Préparer le secret sur ton PC :
      #      python3 -c "
      #      import json
      #      with open('credentials.json') as f: data = json.load(f)
      #      print(json.dumps(data, separators=(',',':')))
      #      "
      #    Coller le résultat dans le secret GDRIVE_CREDENTIALS
      # 4. Partager le dossier Drive avec l'email du compte de service
      # 5. Copier l'ID du dossier (dans l'URL Drive) → GDRIVE_FOLDER_ID
      #
      # POURQUOI PYTHON ICI ?
      # Le JSON contient une "private_key" avec des \n échappés.
      # Python parse et réécrit proprement le JSON sans corrompre
      # ces caractères spéciaux, contrairement à jq ou echo.
      # -------------------------------------------------------
      - name: Configurer rclone (Google Drive)
        env:
          GDRIVE_CRED: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          mkdir -p ~/.config/rclone

          # Python reparse le JSON et le réécrit proprement sur disque
          # Gère nativement les \n dans private_key sans corruption
          python3 -c "
          import json, os
          raw = os.environ['GDRIVE_CRED']
          data = json.loads(raw)
          with open('/home/runner/.config/rclone/gdrive.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('✅ JSON credentials valide')
          "

          # Créer le fichier de configuration rclone
          # [gdrive]               = nom de la connexion
          # type = drive           = connecteur Google Drive
          # scope = drive          = accès complet lecture/écriture
          # service_account_file   = clé JSON du compte de service
          # root_folder_id         = dossier Drive cible
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /home/runner/.config/rclone/gdrive.json
          root_folder_id = GDRIVE_FOLDER_ID_PLACEHOLDER
          EOF

          # Injecter l'ID du dossier (impossible dans un heredoc 'EOF')
          sed -i "s|GDRIVE_FOLDER_ID_PLACEHOLDER|${{ secrets.GDRIVE_FOLDER_ID }}|g" \
            ~/.config/rclone/rclone.conf

          echo "✅ rclone configuré avec succès"

      # -------------------------------------------------------
      # ÉTAPE 5 — Uploader le backup vers Google Drive
      # -------------------------------------------------------
      - name: Uploader vers Google Drive
        run: |
          echo "📤 Upload de ${{ env.FILENAME }}..."
          rclone copy "${{ env.FILENAME }}" gdrive:/
          echo "✅ Upload terminé"

      # -------------------------------------------------------
      # ÉTAPE 6 — Supprimer les backups de plus de 30 jours
      # Modifier --min-age selon tes besoins : 7d, 14d, 30d, 90d
      # -------------------------------------------------------
      - name: Supprimer les backups anciens
        run: |
          echo "🧹 Nettoyage des backups de plus de 30 jours..."
          rclone delete gdrive:/ --min-age 30d
          echo "✅ Nettoyage terminé"

      # -------------------------------------------------------
      # ÉTAPE 7 — Email d'alerte en cas d'échec uniquement
      #
      # SECRETS REQUIS :
      # MAIL_USER     : adresse Gmail
      # MAIL_PASSWORD : mot de passe d'application Gmail
      #   ⚠️ Pas ton vrai mot de passe !
      #   Créer sur : myaccount.google.com/apppasswords
      # -------------------------------------------------------
      - name: Notification en cas d'échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Backup DentiPro échoué"
          body: "Le backup automatique de la base de données DentiPro a échoué. Vérifier les logs GitHub Actions."
          to: ${{ secrets.MAIL_USER }}
          from: "DentiPro Backup <${{ secrets.MAIL_USER }}>"