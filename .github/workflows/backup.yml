# ============================================================
# WORKFLOW : Backup automatique Supabase → Google Drive
# Fréquence : Tous les jours à 2h du matin (UTC)
# Ce fichier doit être placé dans : .github/workflows/backup-supabase.yml
# ============================================================
 
name: Supabase Backup to Google Drive
 
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
 
jobs:
  backup:
    runs-on: ubuntu-latest
 
    steps:
 
      # -------------------------------------------------------
      # ÉTAPE 1 — Installer les outils nécessaires
      # -------------------------------------------------------
      - name: Installer les dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils
          echo "✅ pg_dump installé : $(pg_dump --version)"
 
      # -------------------------------------------------------
      # ÉTAPE 2 — Vérifier la présence des secrets nécessaires
      # -------------------------------------------------------
      - name: Vérifier les secrets
        env:
          CHECK_DB_PASS: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CHECK_GDRIVE:  ${{ secrets.GDRIVE_CREDENTIALS }}
          CHECK_FOLDER:  ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          MISSING=""
          [ -z "$CHECK_DB_PASS" ] && MISSING="$MISSING SUPABASE_DB_PASSWORD"
          [ -z "$CHECK_GDRIVE"  ] && MISSING="$MISSING GDRIVE_CREDENTIALS"
          [ -z "$CHECK_FOLDER"  ] && MISSING="$MISSING GDRIVE_FOLDER_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets manquants :$MISSING"
            exit 1
          fi
          echo "✅ Tous les secrets sont présents"
 
      # -------------------------------------------------------
      # ÉTAPE 3 — Résoudre l'IPv4 du serveur Supabase
      # -------------------------------------------------------
      - name: Récupérer l'IPv4 du serveur
        id: get_ip
        run: |
          HOST="db.rrfbxvlzefyrlkeksmlb.supabase.co"
 
          # Tentative 1 : dig avec filtre IPv4 strict
          IPV4=$(dig +short "$HOST" A 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
 
          # Tentative 2 : getent hosts
          if [ -z "$IPV4" ]; then
            IPV4=$(getent hosts "$HOST" 2>/dev/null | awk '{print $1}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          fi
 
          # Tentative 3 : python3 socket
          if [ -z "$IPV4" ]; then
            IPV4=$(python3 -c "import socket; r=socket.getaddrinfo('$HOST',5432,socket.AF_INET); print(r[0][4][0])" 2>/dev/null || true)
          fi
 
          if [ -z "$IPV4" ]; then
            echo "❌ Impossible de résoudre l'IPv4 de $HOST"
            exit 1
          fi
 
          echo "IPV4=$IPV4" >> "$GITHUB_OUTPUT"
          echo "✅ Adresse IPv4 résolue : $IPV4"
 
      # -------------------------------------------------------
      # ÉTAPE 4 — Tester la connexion à la base avec psql
      # -------------------------------------------------------
      - name: Tester la connexion Supabase
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "🔌 Test de connexion sur ${{ steps.get_ip.outputs.IPV4 }}:5432..."
          psql \
            -h "${{ steps.get_ip.outputs.IPV4 }}" \
            -p 5432 \
            -U postgres \
            -d postgres \
            --connect-timeout=10 \
            -c "SELECT 1 AS connection_ok"
          echo "✅ Connexion réussie"
 
      # -------------------------------------------------------
      # ÉTAPE 5 — Créer le backup compressé
      # -------------------------------------------------------
      - name: Créer le backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
 
          pg_dump \
            -h "${{ steps.get_ip.outputs.IPV4 }}" \
            -p 5432 \
            -U postgres \
            -d postgres \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            | gzip > "$FILENAME"
 
          SIZE=$(stat -c%s "$FILENAME")
          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ Fichier backup suspect : seulement ${SIZE} octets"
            exit 1
          fi
 
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "✅ Backup créé : $FILENAME ($(du -sh "$FILENAME" | cut -f1))"
 
      # -------------------------------------------------------
      # ÉTAPE 6 — Installer rclone
      # -------------------------------------------------------
      - name: Installer rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "✅ rclone installé : $(rclone version | head -1)"
 
      # -------------------------------------------------------
      # ÉTAPE 7 — Configurer rclone avec Google Drive
      # FIX : script Python écrit dans un fichier temporaire
      #        pour éviter les conflits heredoc/indentation YAML
      # -------------------------------------------------------
      - name: Configurer rclone (Google Drive)
        env:
          GDRIVE_CRED: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
 
          # Écrire le script Python dans un fichier temp (pas de heredoc indenté)
          cat > /tmp/write_creds.py << 'ENDOFSCRIPT'
import json, os, sys
raw = os.environ.get('GDRIVE_CRED', '')
if not raw:
    print("❌ GDRIVE_CREDENTIALS est vide")
    sys.exit(1)
try:
    data = json.loads(raw)
except json.JSONDecodeError as e:
    print(f"❌ JSON invalide : {e}")
    sys.exit(1)
with open('/home/runner/.config/rclone/gdrive.json', 'w') as f:
    json.dump(data, f, indent=2)
print("✅ Fichier credentials Google Drive écrit avec succès")
ENDOFSCRIPT
 
          python3 /tmp/write_creds.py
 
          # Écrire la config rclone sans indentation (obligatoire pour heredoc)
          cat > ~/.config/rclone/rclone.conf << ENDOFCONF
[gdrive]
type = drive
scope = drive
service_account_file = /home/runner/.config/rclone/gdrive.json
root_folder_id = ${GDRIVE_FOLDER_ID}
ENDOFCONF
 
          echo "✅ rclone.conf généré :"
          cat ~/.config/rclone/rclone.conf
 
          # Vérifier la connexion Google Drive
          rclone lsd gdrive:/ --max-depth 1 \
            && echo "✅ Connexion Google Drive OK" \
            || { echo "❌ rclone ne peut pas accéder à Google Drive"; exit 1; }
 
      # -------------------------------------------------------
      # ÉTAPE 8 — Uploader le backup vers Google Drive
      # -------------------------------------------------------
      - name: Uploader vers Google Drive
        run: |
          echo "📤 Upload de ${{ env.FILENAME }}..."
          rclone copy "${{ env.FILENAME }}" gdrive:/ --progress
          echo "✅ Upload terminé"
 
      # -------------------------------------------------------
      # ÉTAPE 9 — Supprimer les backups de plus de 30 jours
      # -------------------------------------------------------
      - name: Supprimer les backups anciens
        run: |
          echo "🧹 Nettoyage des backups de plus de 30 jours..."
          rclone delete gdrive:/ --min-age 30d --include "backup_*.sql.gz"
          echo "✅ Nettoyage terminé"
 
      # -------------------------------------------------------
      # ÉTAPE 10 — Notification en cas d'échec uniquement
      # -------------------------------------------------------
      - name: Notification en cas d'échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Backup DentiPro échoué"
          body: "Le backup automatique de la base de données DentiPro a échoué. Vérifier les logs GitHub Actions."
          to: ${{ secrets.MAIL_USER }}
          from: "DentiPro Backup <${{ secrets.MAIL_USER }}>"